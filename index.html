<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Skill - Résumé de Texte</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #818cf8, #38bdf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 720px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    textarea {
      width: 100%;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      padding: 14px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 160px;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #818cf8; }

    .api-key-row {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #e2e8f0;
      padding: 12px 14px;
      font-size: 0.9rem;
      outline: none;
    }

    input[type="text"]:focus { border-color: #818cf8; }

    button {
      background: linear-gradient(135deg, #818cf8, #38bdf8);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px 28px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      margin-top: 16px;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.9; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    .result-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 28px;
      width: 100%;
      max-width: 720px;
      display: none;
    }

    .result-card.visible { display: block; }

    .result-card h2 {
      font-size: 1.1rem;
      color: #818cf8;
      margin-bottom: 16px;
    }

    .result-text {
      line-height: 1.7;
      color: #cbd5e1;
      white-space: pre-wrap;
    }

    .loader {
      display: none;
      text-align: center;
      color: #94a3b8;
      padding: 20px;
    }

    .loader.visible { display: block; }

    .skill-badge {
      display: inline-block;
      background: #1e3a5f;
      color: #38bdf8;
      border: 1px solid #1d4ed8;
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.75rem;
      margin-bottom: 20px;
    }

    .warning {
      background: #422006;
      border: 1px solid #92400e;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.82rem;
      color: #fcd34d;
      margin-bottom: 20px;
    }

    .success {
      background: #052e16;
      border: 1px solid #166534;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.82rem;
      color: #86efac;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <h1>Skill : Résumé de Texte</h1>
  <p class="subtitle">Powered by Claude API + Anthropic Skills</p>
  <span class="skill-badge">skill: resumer-texte</span>

  <div class="card">
    <div class="success">
      ✅ Clé API sécurisée via Netlify Functions — elle n'est jamais exposée dans le navigateur.
    </div>

    <label>Texte à résumer</label>
    <textarea id="inputText" placeholder="Colle ici ton article, email, document..."></textarea>

    <button id="btn" onclick="resumer()">Résumer avec Claude</button>
  </div>

  <div class="loader" id="loader">⏳ Claude analyse le texte...</div>

  <div class="result-card" id="result">
    <h2>📋 Résumé généré</h2>
    <div class="result-text" id="resultText"></div>
  </div>

  <script>

    async function resumer() {
      const text = document.getElementById('inputText').value.trim();

      if (!text) {
        alert('Colle un texte à résumer !');
        return;
      }

      document.getElementById('btn').disabled = true;
      document.getElementById('loader').classList.add('visible');
      document.getElementById('result').classList.remove('visible');

      try {
        // Appel à la Netlify Function (clé API cachée côté serveur)
        const response = await fetch('/.netlify/functions/resumer', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });

        const data = await response.json();

        if (!response.ok) throw new Error(data.error || 'Erreur serveur');

        document.getElementById('resultText').textContent = data.summary;
        document.getElementById('result').classList.add('visible');

      } catch (err) {
        alert('Erreur : ' + err.message);
      } finally {
        document.getElementById('btn').disabled = false;
        document.getElementById('loader').classList.remove('visible');
      }
    }
  </script>

</body>
</html>
